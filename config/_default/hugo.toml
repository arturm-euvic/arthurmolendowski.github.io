baseURL = "https://ArthurMolendowski.github.io/"

# 1. Zmień na swój rok i imię/nazwisko
copyright = "© 2026 Artur Molendowski"
defaultContentLanguage = "pl" # Zmień na "pl" dla polskiej wersji
languageCode = "pl"
title = "W Granicach Spaceru" # Tytuł na karcie w przeglądarce

[params]
  defaultTheme = "dark" # Zostaw "dark" - zdjęcia najlepiej wyglądają na czarnym
  description = "Portfolio fotograficzne - W Granicach Spaceru"
  title = "Artur Molendowski - W Granicach Spaceru" # Tytuł widoczny na stronie głównej
  
  [params.author]
    email = "twoj@email.com"
    name = "Twoje Imię"

  [params.socialIcons]
    # Wklej linki do swoich profili lub usuń linię, jeśli czegoś nie używasz
    instagram = "https://www.instagram.com/TWOJ_PROFIL/"
    facebook = "https://www.facebook.com/TWOJ_PROFIL/"
    email = "mailto:twoj@email.com"
    # github = ... (tę linię możesz usunąć, żeby nie linkować do twórcy szablonu)

[params.gallery]
    boxSpacing = 10 # Odstępy między zdjęciami w pikselach
    targetRowHeight = 300 # Wysokość rzędów zdjęć (możesz zwiększyć)

[imaging]
    quality = 85 # Podbiłem jakość zdjęć z 75 na 85 dla lepszego efektu
